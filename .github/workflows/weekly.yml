name: Weekly Job Watch

on:
  schedule:
    - cron: "0 12 * * 1"   # Every Monday at noon UTC
  workflow_dispatch:

jobs:
  run-job-watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job watcher script
        run: scraper.py

      - name: Send email report via SendGrid
        uses: peter-evans/sendgrid-action@v1
        with:
          api_key: ${{ secrets.SENDGRID_API_KEY }}
          from: clayharryman@gmail.com
          to: clayharryman@gmail.com
          subject: "ETX Job Watch Report"
          body: "Attached is your weekly report."
          attachments: weekly_report.md
